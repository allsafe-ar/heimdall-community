name: Docker CI (Community)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/allsafe-ar/heimdall-community
  # Forzar nombre de proyecto para que docker compose nombre la imagen
  # consistentemente independiente del nombre del directorio en el runner
  COMPOSE_PROJECT_NAME: heimdall-community

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            heimdall-community-app:latest
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull MySQL image
        run: docker pull mysql:8.0

      - name: Generate test .env
        run: |
          cat > .env <<EOF
          DB_PASSWORD=ci_test_db_pw
          DB_ROOT_PASSWORD=ci_test_root_pw
          JWT_SECRET=$(openssl rand -hex 32)
          EOF

      - name: Smoke test
        run: |
          docker compose up -d --no-build
          echo "Waiting for app to respond..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3005/heimdall/api/health; then
              echo ""
              echo "✓ Health check passed"
              break
            fi
            [ $i -eq 30 ] && { echo "Health check timed out"; docker compose logs; exit 1; }
            sleep 5
          done
          docker compose down -v

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Publishing is optional (users install via git clone / docker compose).
        # A pre-existing GHCR package can deny write_package; don't fail the check for it.
        continue-on-error: true
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
