name: Docker CI (Community)

on:
  push:
    branches: [community-main]
  pull_request:
    branches: [community-main]

env:
  IMAGE: ghcr.io/allsafe-ar/heimdall-community
  # Forzar nombre de proyecto para que docker compose nombre la imagen
  # consistentemente independiente del nombre del directorio en el runner
  COMPOSE_PROJECT_NAME: heimdall-community

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: community-main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            heimdall-community-app:latest
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker compose up -d --no-build
          echo "Waiting for app to respond..."
          for i in $(seq 1 20); do
            # /heimdall/ sirve el dashboard (SPA); las trampas capturan /api/*
            if curl -sf -o /dev/null -w "%{http_code}" http://localhost:3005/heimdall/ | grep -q "200"; then
              echo "✓ Health check passed"
              break
            fi
            [ $i -eq 20 ] && { echo "Health check timed out"; docker compose logs; exit 1; }
            sleep 3
          done
          docker compose down -v

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/community-main'
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
