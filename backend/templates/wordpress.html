<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder &lsaquo; Blog de la Empresa &#8212; WordPress</title>
<style>
  html { background: #f1f1f1; }
  body { background: #f1f1f1; color: #444; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; font-size: 13px; line-height: 1.5; }
  #login { width: 320px; padding: 8% 0 0; margin: auto; }
  #login h1 a { background-image: url(https://wordpress.org/about/images/logos/wordpress-logo-simplified-rgb.png); background-size: 84px; background-repeat: no-repeat; background-position: center top; color: #1d2327; height: 84px; font-size: 20px; font-weight: 400; line-height: 1.3; margin: 0 auto 25px; overflow: hidden; padding: 0; text-indent: -9999px; outline: 0; width: 84px; display: block; text-decoration: none; }
  .login label { font-size: 14px; font-weight: 600; color: #1d2327; display: block; margin-bottom: 4px; }
  .login input[type=text], .login input[type=password] { background-color: #fff; border: 1px solid #8c8f94; border-radius: 4px; box-shadow: 0 0 0 transparent; color: #2c3338; font-size: 20px; font-weight: 400; line-height: 1.5; padding: 8px 10px; width: 100%; box-sizing: border-box; outline: none; }
  .login input[type=text]:focus, .login input[type=password]:focus { border-color: #2271b1; box-shadow: 0 0 0 1px #2271b1; }
  .login form { margin-left: 0; padding: 26px 24px 46px; font-weight: 400; overflow: hidden; background: #fff; border: 1px solid #c3c4c7; border-radius: 4px; }
  .user-pass-wrap { margin-bottom: 16px; }
  .wp-pwd { position: relative; }
  #wp-submit { background: #2271b1; border: none; border-radius: 4px; color: #fff; cursor: pointer; display: block; font-size: 14px; font-weight: 600; height: 40px; line-height: 40px; min-width: 120px; padding: 0 16px; text-align: center; width: 100%; margin-top: 8px; }
  #wp-submit:hover { background: #135e96; }
  .forgetmenot { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 13px; color: #50575e; }
  .login #nav { margin: 24px 0 0; padding: 0 24px; text-align: center; }
  .login #nav a { text-decoration: none; color: #2271b1; font-size: 13px; }
  .login #nav a:hover { text-decoration: underline; }
  #login_error { background: #fff; border: 1px solid #8c8f94; border-left: 4px solid #dc3232; border-radius: 4px; margin: 0 0 24px; padding: 12px; font-size: 14px; }
  .login .message { background: #fff; border-left: 4px solid #72aee6; margin: 0 0 16px; padding: 12px; font-size: 14px; }
  * { box-sizing: border-box; }
  .hide { display: none; }
</style>
</head>
<body class="login wp-core-ui">
<div id="login">
  <h1><a href="#" tabindex="-1">Desarrollado con WordPress</a></h1>
  <div id="login_error" class="hide">
    <strong>Error</strong>: El nombre de usuario o la contraseña que ingresaste es incorrecta. <a href="#">¿Olvidaste tu contraseña?</a>
  </div>
  <form name="loginform" id="loginform" method="post">
    <p>
      <label for="user_login">Nombre de usuario o correo electrónico</label>
      <input type="text" name="log" id="user_login" class="input" value="" size="20" autocapitalize="off" autocomplete="username" />
    </p>
    <div class="user-pass-wrap">
      <label for="user_pass">Contraseña</label>
      <div class="wp-pwd">
        <input type="password" name="pwd" id="user_pass" class="input password-input" value="" size="20" autocomplete="current-password" />
      </div>
    </div>
    <p class="forgetmenot">
      <input name="rememberme" type="checkbox" id="rememberme" value="forever">
      <label for="rememberme">Recuérdame</label>
    </p>
    <p class="submit">
      <input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Acceder">
    </p>
  </form>
  <p id="nav">
    <a href="#">¿Olvidaste tu contraseña?</a>
  </p>
  <p id="nav">
    <a href="#" title="¿Estás seguro de que quieres hacer esto?">← Ir a Blog de la Empresa</a>
  </p>
</div>
<script>
document.getElementById("loginform").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("wp-submit");
  const err = document.getElementById("login_error");
  err.classList.add("hide");
  btn.value = "Accediendo...";
  btn.disabled = true;
  try {
    const r = await fetch("/api/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: document.getElementById("user_login").value, password: document.getElementById("user_pass").value })
    });
    if (!r.ok) err.classList.remove("hide");
  } catch { err.classList.remove("hide"); }
  btn.value = "Acceder";
  btn.disabled = false;
});
</script>
</body>
</html>
