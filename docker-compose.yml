services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: heimdall_db
      MYSQL_USER: heimdall
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD no definida — copiá .env.example a .env y completala}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD no definida en .env}
    volumes:
      - heimdall_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    image: heimdall-community-app:latest
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3005}:3005"
    environment:
      PORT: 3005
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: heimdall
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD no definida — copiá .env.example a .env y completala}
      DB_NAME: heimdall_db
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET no definida (generala con openssl rand -hex 32)}"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3005}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - heimdall_uploads:/app/uploads

volumes:
  heimdall_db:
  heimdall_uploads:
